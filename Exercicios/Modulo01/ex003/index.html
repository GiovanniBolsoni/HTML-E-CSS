<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teste de imagens</title>
</head>
<body>
    <h1>testando carga e imagens</h1>
    <p>abaixo voce vai ver uma imagem da pasta:</p>
    <!--ctrl + espaço abre a lista dos arquivos-->
    <img src="html5-logo.png" alt="Logo HTML5">

    <p>podemos tambem carregar imagens que estão em sub-pastas:</p>
    <img src="imagens/css3-logo.png" alt="Logo CSS3">

    <p>tambem podemos carregar imagens externas, devemos ter a URL completa:</p>
    <img src="https://cdn.iconscout.com/icon/free/png-256/free-javascript-icon-svg-download-png-225993.png" alt="Logo Java Script">

</body>
</html>
