<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Itens - Align-self</title>

    <style>
        div.conteiner{
            background-color: lightsalmon;

            display: flex;
            flex-flow: row wrap;
            align-items: flex-start;
            height: 400px;
            
        }

        div.item{
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
            padding: 20px;
        }

        div#i1{
            align-self: auto;
        }
        div#i2{
            align-self: flex-end;
        }
        div#i3{
            align-self: stretch;
        }
        div#i4{
            align-self: flex-start;
        }
        div#i5{
            align-self: center;
        }
    </style>

</head>
<body>
    <!--div conteiner é o pai-->
    <div class="conteiner">
        <!--div item é o filho-->
        <div class="item" id="i1"> Bloco A</div>
        <div class="item" id="i2"> Bloco B</div>
        <div class="item" id="i3"> Bloco C</div>
        <div class="item" id="i4"> Bloco D</div>
        <div class="item" id="i5"> Bloco E</div>
    </div>
</body>
</html>
