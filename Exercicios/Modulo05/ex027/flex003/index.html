<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box - Wrap</title>

    <style>
        div.conteiner{
            background-color: lightsalmon;
            height: 70px;
            display: flex;

            /*flex-wrap:
                nowrap
                wrap
                wrap-reverse
            */
            /*shorthand p/ flex-direction + flex-wrap = flex-flow */
            flex-flow: column-reverse wrap-reverse;
        }

        div.item{
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;

            /*flex: auto apenas funciona nos itens filho*/
            flex: auto;
        }
    </style>

</head>
<body>
    <!--div conteiner é o pai-->
    <div class="conteiner">
        <!--div item é o filho-->
        <div class="item"> Bloco A</div>
        <div class="item"> Bloco B</div>
        <div class="item"> Bloco C</div>
        <div class="item"> Bloco D</div>
        <div class="item"> Bloco E</div>
        <div class="item"> Bloco F</div>
        <div class="item"> Bloco G</div>
    </div>
</body>
</html>
