<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Itens - Basis, Shrink e Grow</title>

    <style>
        div.conteiner{
            background-color: lightsalmon;
            display: flex;
            flex-flow: row nowrap;
        }

        div.item{
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
            flex-basis: 200px;
        }

        div#cxA{
            flex-shrink: 0;
            flex-grow: 1;
        }
        div#cxB{
            flex-shrink: 1;
            flex-grow: 1;
        }
        div#cxC{
            flex-shrink: 8;
            flex-grow: 1;
        }
    </style>

</head>
<body>
    <div class="conteiner">
        <div class="item" id="cxA"> Bloco A</div>
        <div class="item" id="cxB"> Bloco B</div>
        <div class="item" id="cxC"> Bloco C</div>
    </div>
</body>
</html>
