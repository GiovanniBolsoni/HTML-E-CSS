<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box - Align-Content</title>

    <style>
        div.conteiner{
            background-color: lightsalmon;

            display: flex;
            flex-flow: row wrap;

            /*align-content: realiza o alinhamento dos elementos no eixo transversal MAS quando estão empacotados
                stretch
                flex-start
                flex-end
                center

                para espaçamento:
                space-between
                space-evenly
                space-around
            */
            align-content: space-around;
            height: 400px;
        }

        div.item{
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
            padding: 40px;
        }
    </style>

</head>
<body>
    <!--div conteiner é o pai-->
    <div class="conteiner">
        <!--div item é o filho-->
        <div class="item"> Bloco A</div>
        <div class="item"> Bloco B</div>
        <div class="item"> Bloco C</div>
        <div class="item"> Bloco D</div>
        <div class="item"> Bloco E</div>
        <div class="item"> Bloco F</div>
        <div class="item"> Bloco G</div>
        <div class="item"> Bloco H</div>
        <div class="item"> Bloco I</div>
        <div class="item"> Bloco J</div>
        <div class="item"> Bloco K</div>
        <div class="item"> Bloco L</div>
    </div>
</body>
</html>
