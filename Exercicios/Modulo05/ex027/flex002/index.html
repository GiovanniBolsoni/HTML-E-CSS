<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box - Direction</title>

    <style>
        div.conteiner{
            background-color: lightsalmon;
            flex-direction: row;

            display: flex;

            /* flex-direction: 
                row -->
                row-reverse <--
                column (coluna de norte a sul)      
                column-reverse (coluna de sul a norte)
            */
            flex-direction: row-reverse;
        }

        div.item{
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
            padding: 10px;
        }
    </style>

</head>
<body>
    <!--div conteiner é o pai-->
    <div class="conteiner">
        <!--div item é o filho-->
        <div class="item"> Bloco A</div>
        <div class="item"> Bloco B</div>
        <div class="item"> Bloco C</div>
        <div class="item"> Bloco D</div>
        <div class="item"> Bloco E</div>
        <div class="item"> Bloco F</div>
        <div class="item"> Bloco G</div>
    </div>
</body>
</html>
