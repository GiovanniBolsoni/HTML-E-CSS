<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Itens - Flex-Basis</title>

    <style>
        div.conteiner{
            background-color: lightsalmon;

            display: flex;
            flex-flow: row wrap;
        }

        div.item{
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;

            /*A propriedade flex-basis especifica o comprimento inicial de um item flexível. Pode variar por padrão de acordo com o conteudo inserido no item*/
            flex-basis: 150px;
        }
    </style>

</head>
<body>
    <!--div conteiner é o pai-->
    <div class="conteiner">
        <!--div item é o filho-->
        <div class="item"> Bloco A</div>
        <div class="item"> Outro conteudo</div>
        <div class="item"> Bloco C</div>
        <div class="item"> Conteudo um pouco maior</div>
        <div class="item"> Bloco E</div>
        <div class="item"> Outro conteudo maior ainda, que vai ocupar mais espaço</div>
        <div class="item"> Bloco G</div>
    </div>
</body>
</html>
