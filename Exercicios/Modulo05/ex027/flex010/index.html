<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Itens - Shrink e Grow</title>

    <style>
        div.conteiner{
            background-color: lightsalmon;
            display: flex;
            flex-flow: row nowrap;
        }

        div.item{
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
            flex-basis: 250px;

            /*
            flex-shrink define a capacidade de um item flexível encolher
            flex-grow define o fator de crescimento de um item flexível
            */
            flex-shrink: 1;
            flex-grow: 1;
        }
    </style>

</head>
<body>
    <!--div conteiner é o pai-->
    <div class="conteiner">
        <!--div item é o filho-->
        <div class="item"> Bloco A</div>
        <div class="item"> Bloco B</div>
        <div class="item"> Bloco C</div>
    </div>
</body>
</html>
