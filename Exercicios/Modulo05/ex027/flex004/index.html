<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box - Justify e Align</title>

    <style>
        div.conteiner{
            background-color: lightsalmon;
            height: 300px;
            display: flex;
            flex-flow: row nowrap;

            /*justify-content: realiza o alinhamento em relação ao main-axis (eixo principal)
                flex-start
                flex-end
                center
                
                para espaçamento:
                space-between
                space-evenly
                space-around
            */
            justify-content: space-around;

            /*align-items: precisa aumentar o tamanho do conteiner pai
            realiza o alinhamento em relação ao cross-axis (eixo transversal)
                stretch
                flex-start
                flex-end
                center
            */
            align-items: center;
        }

        div.item{
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
        }
    </style>

</head>
<body>
    <!--div conteiner é o pai-->
    <div class="conteiner">
        <!--div item é o filho-->
        <div class="item"> Bloco A</div>
        <div class="item"> Bloco B</div>
        <div class="item"> Bloco C</div>
        <div class="item"> Bloco D</div>
        <div class="item"> Bloco E</div>
        <div class="item"> Bloco F</div>
        <div class="item"> Bloco G</div>
    </div>
</body>
</html>
