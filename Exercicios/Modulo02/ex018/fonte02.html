<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>

    <style>
        /*font-face é a regra para importar fontes externas, o nome da fonte é definido por font-family e o caminho do arquivo é definido por src*/

        @font-face{
            font-family: "Eater";
            src: url("fonts/Eater/Eater-Regular.ttf") format("truetype"); /*tipos de format(s): truetype, opentype, woff, woff2, svg, eot)*/
        }

        body{
            font-family: "Eater", Helvetica, sans-serif;
        }

        h1{
            font-family: "Eater", Times, serif;
            font-size: 3em;
        }
    </style>

</head>
<body>
    
    <!--Sites identificadores de fontes em imagens:
    https://www.whatfontis.com/
    https://www.fontsquirrel.com/
    https://www.myfonts.com/-->

</html>
