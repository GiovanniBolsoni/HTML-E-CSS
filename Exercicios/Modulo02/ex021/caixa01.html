<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixa</title>

    <style>
        h1{ /*Box-Level*/
            background-color: lightgrey;
            height: 300px;
            width: 300px;

            /*Shorthand*/
            border: 10px solid darkblue;

            padding: 10px;
            
            margin: 20px auto 20px auto;

            outline: 5px dashed salmon;
        }

        a{ /*Inline-Level*/
            border: 10px solid red;

            padding: 10px;
        }

        /*display pode mudar a caracteristica padrão de um elemento podendo transformar um box em inline e vise-versa*/
    </style>

</head>
<body>
    <!---->
    <h1>Exemplo de Box-Level</h1>
    <p>Paragrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixa em inline-level</a>. Vamos ver como tudo isso funciona</p>

</body>
</html>
