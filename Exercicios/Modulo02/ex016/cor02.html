<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Gradiente em CSS</title>

    <style>
        * { /*{} configurações globais da CSS*/
           height: 100%;
        }

        body {
            background-image: linear-gradient(to bottom, #D9328E, #983BBF, #F2B05E, #F2762E, #F25050);
            /* background-attachment: fixed; faz com que o background fique fixo*/
            background-attachment: fixed;
        }
    </style>

</head>
<body>
    <h1>Testando Gradiente</h1>
</body>
</html>
