<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query</title>
    <!--Media Queries types e tambem midias futures, types não tem parenteses e futures são indicados entre parenteses isoladamente cada uma-->

    <!--Uma declaração para cada um dos estilos (Mais organizado)-->
    
    <link rel="stylesheet" href="styles/style.css" media="all">
    <!--(orientation:portrait) - modo retrato-->
    <link rel="stylesheet" href="styles/retrato.css" media="screen and (orientation:portrait)">
    <!--(orientation:landscape) - modo paisagem-->
    <link rel="stylesheet" href="styles/paisagem.css" media="screen and (orientation:landscape)">
</head>
<body>
    <h1>Mude a orientação do seu dispositivo</h1>
</body>
</html>
